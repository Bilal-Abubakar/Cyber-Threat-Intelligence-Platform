<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Asset</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
        }

        .navbar {
            background-color: #212529;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar h2 {
            color: white;
            margin: 0;
            font-size: 20px;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin-left: 15px;
            font-size: 14px;
        }

        .navbar a:hover {
            text-decoration: underline;
        }

        .container {
            max-width: 500px;
            background: white;
            margin: 40px auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 12px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background-color: #ffc107;
            color: black;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #e0a800;
        }

        .message {
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .success {
            background-color: #d1e7dd;
            color: #0f5132;
        }

        .danger {
            background-color: #f8d7da;
            color: #842029;
        }

        .warning {
            background-color: #fff3cd;
            color: #664d03;
        }

        .info {
            background-color: #cff4fc;
            color: #055160;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <h2>CTI Platform</h2>
        <div>
            <a href="/view_assets">View Assets</a>
            <a href="/register_asset">Register Asset</a>
            <a href="/logout">Logout</a>
        </div>
    </div>

    <div class="container">
        <h1>Edit Asset</h1>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="message {{ category }}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="/edit_asset/{{ asset['id'] }}" method="POST">
            <label for="name">Asset Name:</label>
            <input type="text" id="name" name="name" value="{{ asset['name'] }}" required>

            <label for="type">Asset Type:</label>
            <input type="text" id="type" name="type" value="{{ asset['asset_type'] }}" required>

            <label for="owner">Asset Owner:</label>
            <input type="text" id="owner" name="owner" value="{{ asset['owner'] }}" required>

            <label for="ip_address">IP Address:</label>
            <input type="text" id="ip_address" name="ip_address" value="{{ asset['ip_address'] }}" required>

            <label for="os">Operating System:</label>
            <input type="text" id="os" name="os" value="{{ asset['os'] }}" required>

            <button type="submit">Update Asset</button>
        </form>
    </div>
</body>
</html>
